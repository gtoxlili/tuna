name: release

# Build release binaries for macOS (arm64 + x86_64), Linux (x86_64), Windows,
# publish a GitHub Release with build-provenance attestations, and notify the
# homebrew-tuna tap so its formula updates immediately (event-driven, no cron lag).
#
# THE RELEASE DECISION IS THE VERSION BUMP: Cargo.toml's `version` is the single
# source of truth. Bump it (and let `cargo build` refresh Cargo.lock) in the
# commit you consider release-worthy — that push is the only thing that builds.
# Ordinary code pushes don't start a single runner (the paths filter below only
# watches Cargo.toml and this file). The `version` job tags v<version> at HEAD;
# a push where the version already has a tag no-ops in seconds.
#
# The tag is pushed with the default GITHUB_TOKEN — nothing listens for tags as a
# workflow trigger, so no PAT is needed for tagging. Notifying the tap DOES need
# a fine-grained PAT (secret TAP_DISPATCH_TOKEN, Contents read/write on
# gtoxlili/homebrew-tuna); when absent, the notify step skips with a notice and
# the tap's weekly self-heal or a manual run catches up.
#
# sherpa-onnx statically links a C++ lib whose build.rs fetches a prebuilt archive per
# target triple (os+arch, not full triple). All four matrix targets have prebuilts;
# musl / windows-gnu / windows-aarch64 / 32-bit do NOT and are deliberately absent.
# Each target builds natively on its own runner — cross-compiling would need a target
# C++ linker + libstdc++, which defeats the "fetch prebuilt" simplicity.

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - '.github/workflows/release.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

# Serialize runs — two pushes racing the tag push / release create would error.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version:
    name: resolve version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.gate.outputs.tag }}
      version: ${{ steps.gate.outputs.version }}
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - uses: actions/checkout@v4

      - name: Gate on Cargo.toml version
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          VER=$(sed -nE 's/^version *= *"([^"]+)".*/\1/p' Cargo.toml | head -n1)
          [ -n "$VER" ] || { echo "::error::no version in Cargo.toml"; exit 1; }
          TAG="v${VER}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

          # Fail fast if Cargo.lock wasn't refreshed after the bump — the builds
          # run with --locked and would otherwise fail 10 minutes later.
          if ! grep -A1 '^name = "tuna"$' Cargo.lock | grep -q "^version = \"${VER}\""; then
              echo "::error::Cargo.lock still has the old tuna version — run 'cargo build' after bumping Cargo.toml and commit the lockfile"
              exit 1
          fi

          EXISTING=$(git ls-remote --tags origin "refs/tags/${TAG}^{}" "refs/tags/${TAG}" | awk '{print $1}' | tail -n1 || true)
          if [ -n "$EXISTING" ]; then
              # Same commit ⇒ idempotent re-run (a failed build can be retried).
              # Different commit ⇒ this push didn't bump the version: no-op.
              # Rebuilding an existing version from a newer commit would clobber
              # published artifacts and break every formula sha256 pinning them.
              if [ "$EXISTING" = "$GITHUB_SHA" ]; then
                  echo "::notice::tag ${TAG} already at this commit; re-run, proceeding"
                  echo "proceed=true" >> "$GITHUB_OUTPUT"
              else
                  echo "::notice::${TAG} already released from another commit — bump [package].version in Cargo.toml to cut a release"
                  echo "proceed=false" >> "$GITHUB_OUTPUT"
              fi
              exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "::notice::pushed tag ${TAG}"
          echo "proceed=true" >> "$GITHUB_OUTPUT"

  build:
    name: build (${{ matrix.target }})
    needs: version
    if: needs.version.outputs.proceed == 'true'
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
            archive: tar.gz
            # .cargo/config.toml sets target-cpu=native for this target — correct for a
            # personal install but NOT portable across Apple Silicon revisions in a
            # distributable build. Override to apple-m1 (baseline of the whole M-series)
            # so the binary runs on M1..M4 alike.
            rustflags: '-C target-cpu=apple-m1'
          - target: x86_64-apple-darwin
            # macos-13 (Intel) was retired 2025-10; macos-15-intel is the current
            # Intel runner, available until ~2027-08. Native build, no cross-compile.
            runner: macos-15-intel
            archive: tar.gz
            rustflags: ''
          - target: x86_64-unknown-linux-gnu
            # The ubuntu-22.04 runner retires 2026-10; building inside an
            # ubuntu:22.04 container on the 24.04 runner keeps the deliberate
            # glibc-2.35 floor (Ubuntu 22.04 / Debian 12 users) past that date.
            runner: ubuntu-24.04
            container: 'ubuntu:22.04'
            archive: tar.gz
            # config.toml uses mold + x86-64-v3; mold isn't in the container.
            # Drop the linker flag, keep the portable x86-64-v3 baseline (AVX2-era,
            # ~2015+ CPUs — documented in the README download section).
            # The binary dynamically links libstdc++.so (sherpa's C++ runtime).
            rustflags: '-C target-cpu=x86-64-v3'
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            archive: zip
            rustflags: ''
    permissions:
      contents: read
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # The Linux target pulls in alsa-sys (via the audio stack), whose build.rs
      # needs the ALSA dev headers. The build runs in a bare ubuntu:22.04 container
      # (root, no sudo), which also needs the base toolchain + curl BEFORE the
      # rust-toolchain action can bootstrap rustup.
      - name: install linux system deps
        if: runner.os == 'Linux'
        run: |
          apt-get update
          apt-get install -y curl ca-certificates git build-essential pkg-config libasound2-dev

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # rust-cache keys on rustc version + target + Cargo.lock automatically and prunes
      # stale files. sherpa-onnx's prebuilt archive lives under target/<target>/ (the
      # build script's OUT_DIR), so it is covered by the default target/ cache.
      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: build release
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }} --locked

      # Package the binary flat (at the archive root) — Homebrew's `bin.install`
      # looks for the binary relative to the extracted archive root.
      - name: package (unix)
        if: matrix.archive == 'tar.gz'
        env:
          VER: ${{ needs.version.outputs.tag }}
        run: |
          ver="${VER:-dev}"
          staging="tuna-${ver}-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/tuna" "$staging/"
          cp README.md "$staging/" 2>/dev/null || true
          cp LICENSE "$staging/" 2>/dev/null || true
          # -C staging so paths are relative to staging (flat, no nesting)
          tar czf "$staging.tar.gz" -C "$staging" tuna README.md LICENSE 2>/dev/null \
            || tar czf "$staging.tar.gz" -C "$staging" tuna
          # shasum (perl) on macOS; sha256sum (coreutils) in the linux container
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$staging.tar.gz" | tee checksums-${{ matrix.target }}.txt
          else
            sha256sum "$staging.tar.gz" | tee checksums-${{ matrix.target }}.txt
          fi

      - name: package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          VER: ${{ needs.version.outputs.tag }}
        run: |
          $ver = $env:VER; if (-not $ver) { $ver = "dev" }
          $staging = "tuna-${ver}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/tuna.exe" "$staging/"
          Copy-Item README.md "$staging/" -ErrorAction SilentlyContinue
          Copy-Item LICENSE "$staging/" -ErrorAction SilentlyContinue
          # Flat: contents only, no wrapping directory
          Compress-Archive -Path "$staging/*" -DestinationPath "$staging.zip"
          (Get-FileHash "$staging.zip" -Algorithm SHA256).Hash | Tee-Object "checksums-${{ matrix.target }}.txt"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tuna-${{ matrix.target }}
          path: |
            tuna-*.${{ matrix.archive }}
            checksums-${{ matrix.target }}.txt

      # Sign each artifact with a build-provenance attestation (Sigstore/Fulcio/Rekor,
      # free, no cosign needed). Lets users verify the binary came from this workflow
      # via `gh attestation verify`. Every run produces a release, so always attest.
      - name: attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            tuna-*.${{ matrix.archive }}

  release:
    name: publish release
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # checkout so `gh` can resolve the repo from its remote (download-artifact
      # alone leaves no .git for gh to introspect).
      - uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag='${{ needs.version.outputs.tag }}'
          # Idempotent: a re-run on the same commit finds an existing release and
          # re-uploads (clobber) instead of erroring on a duplicate create.
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "::notice::release $tag exists; uploading artifacts (clobber)"
            gh release upload "$tag" \
              artifacts/tuna-*.tar.gz artifacts/tuna-*.zip artifacts/checksums-*.txt --clobber
          else
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              artifacts/tuna-*.tar.gz artifacts/tuna-*.zip artifacts/checksums-*.txt
          fi

  # Event-driven tap update: fire a repository_dispatch at gtoxlili/homebrew-tuna
  # the moment the release is published, so `brew install` serves the new version
  # immediately instead of after a daily cron. The tap's sync workflow reads the
  # release itself (tag + checksums), so the payload only carries the tag for
  # traceability. Needs TAP_DISPATCH_TOKEN (fine-grained PAT, Contents read/write
  # on homebrew-tuna); without it this skips with a notice and the tap's weekly
  # self-heal or a manual run catches up.
  notify-tap:
    name: notify homebrew tap
    needs: [version, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: dispatch sync-formula
        env:
          GH_TOKEN: ${{ secrets.TAP_DISPATCH_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "$GH_TOKEN" ]; then
            echo "::notice::TAP_DISPATCH_TOKEN not configured — homebrew-tuna not notified; its weekly self-heal (or a manual sync-formula run) will pick up ${TAG}"
            exit 0
          fi
          gh api "repos/gtoxlili/homebrew-tuna/dispatches" \
            -f event_type=tuna-release \
            -f "client_payload[tag]=${TAG}"
          echo "::notice::homebrew-tuna notified for ${TAG}"
