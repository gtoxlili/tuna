name: release

# Build release binaries for macOS (arm64 + x86_64), Linux (x86_64), Windows,
# publish a GitHub Release, and sign each artifact with a build-provenance
# attestation — all on every push to main that touches the app's build inputs.
#
# No manual tagging: the `tag` job derives v<major>.<minor>.<patch> (patch = a
# monotone commit-count over the same build-input paths) and pushes it *within
# this run*, so the build/release jobs just depend on it via `needs`. Because
# nothing listens for the tag as a workflow trigger, it can be pushed with the
# default GITHUB_TOKEN — no PAT required (a GITHUB_TOKEN-pushed tag is silently
# ignored by an `on: push: tags` trigger, but we don't use one).
#
# sherpa-onnx statically links a C++ lib whose build.rs fetches a prebuilt archive per
# target triple (os+arch, not full triple). All four matrix targets have prebuilts;
# musl / windows-gnu / windows-aarch64 / 32-bit do NOT and are deliberately absent.
# Each target builds natively on its own runner — cross-compiling would need a target
# C++ linker + libstdc++, which defeats the "fetch prebuilt" simplicity.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - 'assets/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Bootstrap value used only when the repo has no existing v* tag yet; once one
  # exists the `tag` job reads major.minor from the highest one. Bumping
  # major/minor is a one-time manual `git tag v0.2.0 && git push --tags`.
  INITIAL_MAJOR_MINOR: '0.1'

permissions:
  contents: read

# Serialize runs — two pushes racing the tag push / release create would error.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag:
    name: resolve version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so rev-list --count sees every commit; fetch-tags so we
          # can derive major.minor from existing tags and detect duplicates.
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          # Highest existing v<major>.<minor>.<patch> tag, version-aware so
          # v0.1.10 sorts after v0.1.9 (lexical sort gets it wrong). The 'v[0-9]*'
          # glob rejects stray non-version tags.
          LATEST=$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n1 || true)
          if [ -n "$LATEST" ] && \
             MM=$(echo "$LATEST" | sed -nE 's|^v([0-9]+\.[0-9]+)(\..*)?$|\1|p') && \
             [ -n "$MM" ]; then
              MAJOR_MINOR="$MM"
              echo "MAJOR_MINOR=${MAJOR_MINOR} (from existing tag ${LATEST})"
          else
              MAJOR_MINOR='${{ env.INITIAL_MAJOR_MINOR }}'
              echo "MAJOR_MINOR=${MAJOR_MINOR} (no prior tag, using bootstrap)"
          fi

          # Patch = commits that touched build inputs — same scope as the trigger,
          # so doc-only churn neither tags nor inflates the version.
          COUNT=$(git rev-list --count HEAD -- src Cargo.toml Cargo.lock .cargo assets)
          TAG="v${MAJOR_MINOR}.${COUNT}"
          echo "Resolved tag: ${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Push tag if new
        shell: bash
        run: |
          set -euo pipefail
          TAG='${{ steps.version.outputs.tag }}'
          # Idempotent: a re-run on the same commit finds the tag already on origin
          # and skips instead of failing the push.
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
              echo "::notice::tag ${TAG} already on origin; re-run on same commit, skipping push"
              exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -a "${TAG}" -m "Auto-tag ${TAG} at ${GITHUB_SHA}"
          git push origin "${TAG}"
          echo "::notice::pushed tag ${TAG}"

  build:
    name: build (${{ matrix.target }})
    needs: tag
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
            archive: tar.gz
            # .cargo/config.toml sets target-cpu=native for this target — correct for a
            # personal install but NOT portable across Apple Silicon revisions in a
            # distributable build. Override to apple-m1 (baseline of the whole M-series)
            # so the binary runs on M1..M4 alike.
            rustflags: '-C target-cpu=apple-m1'
          - target: x86_64-apple-darwin
            # macos-13 (Intel) was retired 2025-10; macos-15-intel is the current
            # Intel runner, available until ~2027-08. Native build, no cross-compile.
            runner: macos-15-intel
            archive: tar.gz
            rustflags: ''
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: tar.gz
            # config.toml uses mold + x86-64-v3; mold isn't on the stock ubuntu runner.
            # Drop the linker flag, keep the portable x86-64-v3 baseline (AVX2-era).
            # The binary dynamically links libstdc++.so (sherpa's C++ runtime) —
            # ubuntu 22.04's glibc 2.35 is a safe floor for most modern distros.
            rustflags: '-C target-cpu=x86-64-v3'
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            archive: zip
            rustflags: ''
    permissions:
      contents: read
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # rust-cache keys on rustc version + target + Cargo.lock automatically and prunes
      # stale files. sherpa-onnx's prebuilt archive lives under target/<target>/ (the
      # build script's OUT_DIR), so it is covered by the default target/ cache.
      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # The Linux target pulls in alsa-sys (via the audio stack), whose build.rs
      # needs the ALSA dev headers — not preinstalled on the stock ubuntu runner.
      - name: install linux system deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: build release
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }} --locked

      # Package the binary flat (at the archive root) — Homebrew's `bin.install`
      # looks for the binary relative to the extracted archive root.
      - name: package (unix)
        if: matrix.archive == 'tar.gz'
        env:
          VER: ${{ needs.tag.outputs.tag }}
        run: |
          ver="${VER:-dev}"
          staging="tuna-${ver}-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/tuna" "$staging/"
          cp README.md "$staging/" 2>/dev/null || true
          cp LICENSE "$staging/" 2>/dev/null || true
          # -C staging so paths are relative to staging (flat, no nesting)
          tar czf "$staging.tar.gz" -C "$staging" tuna README.md LICENSE 2>/dev/null \
            || tar czf "$staging.tar.gz" -C "$staging" tuna
          shasum -a 256 "$staging.tar.gz" | tee checksums-${{ matrix.target }}.txt

      - name: package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          VER: ${{ needs.tag.outputs.tag }}
        run: |
          $ver = $env:VER; if (-not $ver) { $ver = "dev" }
          $staging = "tuna-${ver}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/tuna.exe" "$staging/"
          Copy-Item README.md "$staging/" -ErrorAction SilentlyContinue
          Copy-Item LICENSE "$staging/" -ErrorAction SilentlyContinue
          # Flat: contents only, no wrapping directory
          Compress-Archive -Path "$staging/*" -DestinationPath "$staging.zip"
          (Get-FileHash "$staging.zip" -Algorithm SHA256).Hash | Tee-Object "checksums-${{ matrix.target }}.txt"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tuna-${{ matrix.target }}
          path: |
            tuna-*.${{ matrix.archive }}
            checksums-${{ matrix.target }}.txt

      # Sign each artifact with a build-provenance attestation (Sigstore/Fulcio/Rekor,
      # free, no cosign needed). Lets users verify the binary came from this workflow
      # via `gh attestation verify`. Every run produces a release, so always attest.
      - name: attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            tuna-*.${{ matrix.archive }}

  release:
    name: publish release
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # checkout so `gh` can resolve the repo from its remote (download-artifact
      # alone leaves no .git for gh to introspect).
      - uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag='${{ needs.tag.outputs.tag }}'
          # Idempotent: a re-run on the same commit finds an existing release and
          # re-uploads (clobber) instead of erroring on a duplicate create.
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "::notice::release $tag exists; uploading artifacts (clobber)"
            gh release upload "$tag" \
              artifacts/tuna-*.tar.gz artifacts/tuna-*.zip artifacts/checksums-*.txt --clobber
          else
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              artifacts/tuna-*.tar.gz artifacts/tuna-*.zip artifacts/checksums-*.txt
          fi
