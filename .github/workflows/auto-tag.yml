name: auto-tag

# Auto-tag a release on every push to main that touches the app's build inputs
# (src, Cargo manifest/lock, .cargo config, embedded asset data). The pushed tag
# then trips release.yml's `on: push: tags: ['v*']`, which builds the binaries
# and publishes the GitHub Release — no manual `git tag` needed.
#
# Version shape: v<major>.<minor>.<patch>
#   major.minor — read from the highest existing v* tag; falls back to 0.1
#                 (matches Cargo.toml) on the very first run.
#   patch       — `git rev-list --count HEAD -- <source paths>`: a monotone
#                 count of commits that changed build inputs. Scoping the count
#                 to the same paths as the trigger keeps doc-only churn from
#                 inflating the patch number. Bumping major/minor is a one-time
#                 manual `git tag v0.2.0 && git push --tags`, after which CI
#                 keeps auto-incrementing the patch on the new line.
#
# WHY A PAT, NOT GITHUB_TOKEN:
# Pushing the tag with the repo's default GITHUB_TOKEN would NOT re-trigger
# release.yml — GitHub deliberately suppresses workflow runs caused by
# GITHUB_TOKEN (except workflow_dispatch / repository_dispatch). So the tag is
# pushed with a fine-grained PAT (secret PAT_TAG_TOKEN, "Contents: Read and
# Write" on gtoxlili/tuna). See the guard step below for the one-time setup.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - 'assets/**'
      - '.github/workflows/auto-tag.yml'

permissions:
  contents: write

# Serialize tag pushes — two concurrent runs racing the same `git push` would
# just throw spurious "tag already exists" errors.
concurrency:
  group: auto-tag
  cancel-in-progress: false

env:
  # Bootstrap value used only when the repo has no existing v* tag yet. Once any
  # such tag exists, the workflow reads MAJOR_MINOR from the highest one.
  INITIAL_MAJOR_MINOR: '0.1'

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      # Fail fast with a actionable message if the PAT secret isn't configured,
      # instead of an opaque 403 from checkout/push.
      - name: Verify PAT is configured
        env:
          PAT: ${{ secrets.PAT_TAG_TOKEN }}
        if: ${{ env.PAT == '' }}
        run: |
          echo "::error::Secret PAT_TAG_TOKEN is not set."
          echo "::error::Create a fine-grained PAT with 'Contents: Read and write'"
          echo "::error::on gtoxlili/tuna (Settings → Developer settings → Personal access"
          echo "::error::tokens → Fine-grained tokens), then add it as a repository"
          echo "::error::secret named PAT_TAG_TOKEN. Without it the tag push can't trip"
          echo "::error::release.yml — a GITHUB_TOKEN-pushed tag is silently ignored."
          exit 1

      - name: Checkout (with PAT so the tag push authenticates as a real actor)
        uses: actions/checkout@v4
        with:
          # Full history so rev-list --count sees every commit; fetch-tags so we
          # can detect existing tags and derive major.minor from them.
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.PAT_TAG_TOKEN }}

      - name: Resolve tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          # Highest-versioned existing v<major>.<minor>.<patch> tag. --sort=-v:refname
          # is version-aware so v0.1.10 sorts after v0.1.9 (lexical sort gets it wrong).
          # The 'v[0-9]*' glob rejects stray non-version tags like branch names.
          LATEST=$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n1 || true)
          if [ -n "$LATEST" ] && \
             MM=$(echo "$LATEST" | sed -nE 's|^v([0-9]+\.[0-9]+)(\..*)?$|\1|p') && \
             [ -n "$MM" ]; then
              MAJOR_MINOR="$MM"
              echo "MAJOR_MINOR=${MAJOR_MINOR} (from existing tag ${LATEST})"
          else
              MAJOR_MINOR='${{ env.INITIAL_MAJOR_MINOR }}'
              echo "MAJOR_MINOR=${MAJOR_MINOR} (no prior tag, using bootstrap)"
          fi

          # Count commits that touched build inputs — same scope as the trigger,
          # so doc-only commits neither tag nor inflate the patch number.
          COUNT=$(git rev-list --count HEAD -- src Cargo.toml Cargo.lock .cargo assets)
          TAG="v${MAJOR_MINOR}.${COUNT}"
          echo "Resolved tag: ${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Push tag if new
        shell: bash
        run: |
          set -euo pipefail
          TAG='${{ steps.version.outputs.tag }}'

          # Ask the remote (not local refs) whether the tag already exists, so a
          # tag left behind by a previous partial run can't make us skip or fail.
          # Idempotent: re-running CI on the same commit just noops.
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
              echo "::notice::tag ${TAG} already on origin; re-run on the same commit, skipping"
              exit 0
          fi

          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -a "${TAG}" -m "Auto-tag ${TAG} at ${GITHUB_SHA}"
          git push origin "${TAG}"
          echo "::notice::pushed tag ${TAG}"
